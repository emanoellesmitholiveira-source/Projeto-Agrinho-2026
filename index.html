<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAgro Interativo - Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agro Forte, Futuro Sustentável</h1>
        <p>Equilíbrio entre Produção e Meio Ambiente</p>
    </header>

    <main class="container">
        <section class="simulador">
            <h2>Simulador de Práticas Sustentáveis</h2>
            <p>Selecione as técnicas para aplicar na fazenda:</p>
            
            <label>
                <input type="checkbox" id="plantio" onchange="atualizarSimulador()"> Plantio Direto (Protege o solo)
            </label>
            <label>
                <input type="checkbox" id="tecnologia" onchange="atualizarSimulador()"> Agricultura de Precisão/Drones (Evita desperdício)
            </label>
            <label>
                <input type="checkbox" id="ilpf" onchange="atualizarSimulador()"> Integração Lavoura-Pecuária-Floresta (Sustentabilidade)
            </label>
        </section>

        <section class="resultados">
            <h2>Status da Propriedade</h2>
            <div class="barra-status">
                <span>Produtividade: </span><strong id="prod-val">50%</strong>
            </div>
            <div class="barra-status">
                <span>Preservação Ambiental: </span><strong id="amb-val">50%</strong>
            </div>
            <p id="mensagem">Adote práticas sustentáveis para equilibrar a balança!</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
